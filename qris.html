<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="#0b0b0b" name="theme-color">
  <meta content="Halaman pembayaran QRIS SUNSET DI KEBUN 2026" name="description">
  <title>SUNSET DI KEBUN 2026 | Pembayaran QRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOADING -->
  <div class="qris-loading" id="qrisLoading" aria-hidden="true">
    <div class="spin"></div>
    <h2>Memproses Pembayaran...</h2>
  </div>

  <div class="container qris-container">
    <!-- HEADER -->
    <header class="qris-header">
      <a href="form.html" class="form-back" aria-label="Kembali">&larr; Kembali</a>
      <div class="qris-logo">
        <img alt="Logo" src="images/logo-event.png" width="40" height="40">
        <span>SUNSET DI KEBUN</span>
      </div>
    </header>

    <!-- ORDER INFO -->
    <div class="qris-card">
      <div class="qris-label">ORDER ID</div>
      <div class="qris-order" id="orderId">-</div>
      <div class="qris-label" style="margin-top:16px">TOTAL PEMBAYARAN</div>
      <div class="qris-total" id="total">Rp 0</div>
      <div class="qris-info">
        <div><b>Jenis Tiket:</b> <span id="jenisTiket">-</span></div>
        <div><b>Jumlah Tiket:</b> <span id="jumlahTiket">0</span></div>
        <div><b>Nama:</b> <span id="namaPemesan">-</span></div>
        <div><b>WhatsApp:</b> <span id="waPemesan">-</span></div>
      </div>
    </div>

    <!-- QR CODE -->
    <div class="qris-card qris-qr-wrap">
      <div class="qris-timer-box">
        <div class="qris-timer-title">SELESAIKAN PEMBAYARAN DALAM</div>
        <div class="qris-timer" id="timer">15:00</div>
      </div>
      <div class="qris-qr">
        <img alt="QRIS Payment" src="images/qris-sunset.png" width="270" height="270">
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="qris-card">
      <label for="file">
        <div class="qris-upload">
          <h3>Upload Bukti Pembayaran</h3>
          <p>Pilih file bukti pembayaran</p>
        </div>
      </label>
      <input accept="image/*" hidden id="file" type="file">
      <div class="qris-result" id="result">
        <div id="fname"></div>
        <div class="qris-ok">Bukti pembayaran berhasil dipilih</div>
      </div>
      <div class="qris-agree">
        <input id="cek" type="checkbox">
        <label for="cek">Saya menyatakan telah melakukan pembayaran dan mengunggah bukti pembayaran yang valid.</label>
      </div>
      <button disabled id="btn">KONFIRMASI PEMBAYARAN</button>
    </div>
  </div>

  <script src="js/qris.js" defer></script>
</body>
</html>
